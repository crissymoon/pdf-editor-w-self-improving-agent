<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local Email Inbox</title>
  <style>
    :root {
      --bg:         #07101e;
      --surface:    #0d1928;
      --surface-hi: #132033;
      --border:     #1e3152;
      --border-hi:  #2f4e7c;
      --ink:        #cdd8f0;
      --ink-dim:    #6b84aa;
      --ink-faint:  #3a5070;
      --accent:     #3e74d5;
      --accent-hi:  #5d90f0;
      --ok:         #3aaa6e;
      --warn:       #c88c28;
      --err:        #c84040;
      --radius:     8px;
      --font-ui:    "Segoe UI",Helvetica,Arial,sans-serif;
      --font-mono:  "Cascadia Code","JetBrains Mono",Consolas,"Courier New",monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-ui);
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--ink);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    /* ---------- toolbar ---------- */
    .toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .toolbar h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--ink);
      flex: 1 1 auto;
    }
    .badge {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface-hi);
      border: 1px solid var(--border-hi);
      color: var(--ink-dim);
      min-width: 40px;
      text-align: center;
    }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--ink-faint);
      flex: 0 0 auto;
      transition: background .3s;
    }
    .status-dot.ok  { background: var(--ok); }
    .status-dot.err { background: var(--err); }
    .toolbar input[type=search] {
      font-family: var(--font-ui);
      font-size: 12.5px;
      background: var(--bg);
      border: 1px solid var(--border-hi);
      border-radius: var(--radius);
      color: var(--ink);
      padding: 4px 10px;
      outline: none;
      width: 180px;
    }
    .toolbar input[type=search]::placeholder { color: var(--ink-faint); }
    .toolbar input[type=search]:focus { border-color: var(--accent); }
    button {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border-hi);
      background: var(--surface-hi);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    button:hover { border-color: var(--accent); background: #162540; }
    button.danger:hover { border-color: var(--err); }
    .auto-label {
      font-size: 11.5px;
      color: var(--ink-dim);
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .auto-label input { accent-color: var(--accent); cursor: pointer; }

    /* ---------- main layout ---------- */
    .layout {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
    }

    /* ---------- message list ---------- */
    .list-pane {
      width: 320px;
      flex: 0 0 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .list-scroll {
      flex: 1 1 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .list-scroll::-webkit-scrollbar { width: 6px; }
    .list-scroll::-webkit-scrollbar-track { background: transparent; }
    .list-scroll::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .msg-row:hover { background: var(--surface-hi); }
    .msg-row.active { background: #152540; border-left: 3px solid var(--accent); padding-left: 9px; }
    .msg-row-subject {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-row-meta {
      font-size: 11px;
      color: var(--ink-dim);
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }
    .msg-row-to {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1 1 0;
    }
    .msg-row-time { flex: 0 0 auto; font-family: var(--font-mono); }
    .empty-msg {
      padding: 24px 14px;
      color: var(--ink-faint);
      font-size: 12px;
      text-align: center;
    }

    /* ---------- detail pane ---------- */
    .detail-pane {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-header {
      flex: 0 0 auto;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .detail-header .subject {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--ink);
    }
    .detail-header .fields {
      margin-top: 4px;
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 2px 8px;
      font-size: 11.5px;
      color: var(--ink-dim);
    }
    .detail-header .field-label { font-weight: 600; color: var(--ink-faint); }
    .tab-bar {
      flex: 0 0 auto;
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 12px;
    }
    .tab {
      font-size: 12px;
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--ink-dim);
      border-radius: 0;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }
    .tab:hover { color: var(--ink); background: transparent; border-color: transparent; }
    .tab.active { color: var(--accent-hi); border-bottom-color: var(--accent); }
    .detail-body {
      flex: 1 1 0;
      min-height: 0;
      overflow: auto;
      padding: 14px 16px;
      background: var(--bg);
    }
    .detail-body::-webkit-scrollbar { width: 6px; }
    .detail-body::-webkit-scrollbar-track { background: transparent; }
    .detail-body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
    .raw-body {
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--ink);
      line-height: 1.6;
    }
    .html-frame {
      width: 100%; height: 100%;
      border: none;
      background: #fff;
      border-radius: var(--radius);
    }
    .placeholder-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--ink-faint);
      font-size: 13px;
      letter-spacing: .02em;
    }

    /* ---------- highlight 6-digit code ---------- */
    .code-pill {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .18em;
      padding: 3px 14px;
      background: #162d48;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent-hi);
      margin: 6px 0;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="status-dot" id="dot"></span>
  <h1>Local Email Inbox</h1>
  <span class="badge" id="count-badge">--</span>
  <input type="search" id="search" placeholder="Filter subject / recipient" />
  <label class="auto-label">
    <input type="checkbox" id="auto-refresh" checked />
    Auto-refresh
  </label>
  <button id="refresh-btn">Refresh</button>
  <button class="danger" id="clear-btn">Clear all</button>
</div>

<div class="layout">
  <div class="list-pane">
    <div class="list-scroll" id="msg-list"></div>
  </div>
  <div class="detail-pane" id="detail-pane">
    <div class="placeholder-msg" id="placeholder">Select a message to read it</div>
  </div>
</div>

<script>
(() => {
  const API = 'http://127.0.0.1:8025';
  const POLL_MS = 3000;

  let allMessages  = [];
  let activeId     = null;
  let activeTab    = 'raw';   // 'raw' | 'html'
  let fullMessages = {};      // id -> full message object
  let pollTimer    = null;
  let pollFailures = 0;

  // Elements
  const dot        = document.getElementById('dot');
  const countBadge = document.getElementById('count-badge');
  const searchEl   = document.getElementById('search');
  const autoEl     = document.getElementById('auto-refresh');
  const refreshBtn = document.getElementById('refresh-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const listEl     = document.getElementById('msg-list');
  const detailPane = document.getElementById('detail-pane');
  const placeholder= document.getElementById('placeholder');

  // ------------------------------------------------------------------ helpers
  async function apiFetch(path, opts = {}) {
    const r = await fetch(API + path, { cache: 'no-store', ...opts });
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d)) return ts;
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    return `${hh}:${mm}:${ss}`;
  }

  function filterText() { return searchEl.value.trim().toLowerCase(); }

  function filtered() {
    const q = filterText();
    if (!q) return allMessages;
    return allMessages.filter(m =>
      (m.subject || '').toLowerCase().includes(q) ||
      ((m.to || []).join(' ')).toLowerCase().includes(q)
    );
  }

  // ------------------------------------------------------------------ status dot
  function setStatus(ok) {
    dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
    pollFailures  = ok ? 0 : pollFailures + 1;
  }

  // ------------------------------------------------------------------ list
  function renderList() {
    const msgs = filtered();
    listEl.innerHTML = '';
    if (!msgs.length) {
      listEl.innerHTML = '<div class="empty-msg">No messages</div>';
      return;
    }
    for (const m of msgs) {
      const row = document.createElement('div');
      row.className = 'msg-row' + (m.id === activeId ? ' active' : '');
      row.dataset.id = m.id;
      const toStr = (m.to || []).join(', ') || '(no recipient)';
      row.innerHTML = `
        <div class="msg-row-subject" title="${esc(m.subject || '(no subject)')}">${esc(m.subject || '(no subject)')}</div>
        <div class="msg-row-meta">
          <span class="msg-row-to" title="${esc(toStr)}">${esc(toStr)}</span>
          <span class="msg-row-time">${fmtTime(m.received_at || m.date)}</span>
        </div>`;
      row.addEventListener('click', () => openMessage(m.id));
      listEl.appendChild(row);
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ------------------------------------------------------------------ polling
  async function poll() {
    try {
      const data = await apiFetch('/messages');
      allMessages = Array.isArray(data) ? data : [];
      countBadge.textContent = allMessages.length;
      setStatus(true);
      const f = filtered();
      // invalidate full-message cache for new messages
      const known = new Set(Object.keys(fullMessages).map(Number));
      for (const m of allMessages) { if (!known.has(m.id)) delete fullMessages[m.id]; }
      renderList();
      // if active message was deleted, clear detail
      if (activeId !== null && !allMessages.find(m => m.id === activeId)) {
        clearDetail();
      }
    } catch(e) {
      setStatus(false);
      countBadge.textContent = '!';
    } finally {
      if (autoEl.checked) pollTimer = setTimeout(poll, POLL_MS);
    }
  }

  async function forcePoll() {
    clearTimeout(pollTimer);
    await poll();
  }

  // ------------------------------------------------------------------ detail
  async function openMessage(id) {
    activeId = id;
    renderList(); // highlight row

    let msg = fullMessages[id];
    if (!msg) {
      try {
        msg = await apiFetch(`/message/${id}`);
        fullMessages[id] = msg;
      } catch(e) {
        renderDetail(null);
        return;
      }
    }
    renderDetail(msg);
  }

  function clearDetail() {
    activeId = null;
    renderList();
    detailPane.innerHTML = '';
    detailPane.appendChild(placeholder);
  }

  function renderDetail(msg) {
    if (!msg) {
      detailPane.innerHTML = '<div class="placeholder-msg">Failed to load message</div>';
      return;
    }

    const toStr   = (msg.to   || []).join(', ') || '—';
    const fromStr = (msg.from || []).join(', ') || '—';
    const subject = msg.subject || '(no subject)';
    const raw     = msg.raw    || '';
    const hasHtml = /<[a-zA-Z]/.test(raw);

    // Extract 6-digit code from raw text for quick display
    const codeMatch = raw.match(/(?:^|\s)(\d{6})(?:\s|$)/m);

    detailPane.innerHTML = `
      <div class="detail-header">
        <div class="subject">${esc(subject)}</div>
        ${codeMatch ? `<div style="margin-top:6px"><span class="code-pill">${esc(codeMatch[1])}</span><span style="margin-left:8px;font-size:11px;color:var(--ink-dim)">6-digit code</span></div>` : ''}
        <div class="fields">
          <span class="field-label">From</span><span>${esc(fromStr)}</span>
          <span class="field-label">To</span><span>${esc(toStr)}</span>
        </div>
      </div>
      <div class="tab-bar" id="tab-bar"></div>
      <div class="detail-body" id="detail-body"></div>`;

    const tabBar  = document.getElementById('tab-bar');
    const bodyEl  = document.getElementById('detail-body');

    const tabs = [{ id: 'raw', label: 'Raw' }];
    if (hasHtml) tabs.push({ id: 'html', label: 'HTML preview' });

    tabs.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (activeTab === t.id ? ' active' : '');
      btn.textContent = t.label;
      btn.addEventListener('click', () => {
        activeTab = t.id;
        renderBody(bodyEl, raw, activeTab);
        tabBar.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
      });
      tabBar.appendChild(btn);
    });

    if (hasHtml && activeTab === 'html') {
      renderBody(bodyEl, raw, 'html');
    } else {
      activeTab = 'raw';
      renderBody(bodyEl, raw, 'raw');
    }
  }

  function renderBody(el, raw, tab) {
    if (tab === 'html') {
      const htmlContent = extractHtmlPart(raw) || raw;
      // Use srcdoc inside sandboxed iframe for safe preview
      const frame = document.createElement('iframe');
      frame.className = 'html-frame';
      frame.sandbox   = 'allow-same-origin';
      frame.srcdoc    = htmlContent;
      el.innerHTML    = '';
      el.appendChild(frame);
    } else {
      el.innerHTML = `<pre class="raw-body">${esc(raw)}</pre>`;
    }
  }

  function extractHtmlPart(raw) {
    // Very basic MIME boundary extraction — enough for local test emails
    const htmlMatch = raw.match(/Content-Type:\s*text\/html[^\r\n]*[\r\n]+([\s\S]*?)(?=--|\z)/i);
    if (htmlMatch) {
      // Strip any Content-Transfer-Encoding header lines and decode base64 if needed
      let part = htmlMatch[1].replace(/^[A-Za-z-]+:[^\r\n]*\r?\n/,'').trim();
      try {
        if (/^[A-Za-z0-9+/\r\n]+=*$/.test(part.slice(0, 200))) {
          part = atob(part.replace(/\s/g,''));
        }
      } catch {}
      return part;
    }
    // Fall back to heuristic: find first <html> tag
    const idx = raw.toLowerCase().indexOf('<html');
    if (idx !== -1) return raw.slice(idx);
    return null;
  }

  // ------------------------------------------------------------------ clear
  async function clearAll() {
    if (!confirm('Clear all messages from the inbox?')) return;
    try {
      await apiFetch('/clear', { method: 'POST' });
      fullMessages = {};
      clearDetail();
      await forcePoll();
    } catch(e) {
      alert('Clear failed: ' + e.message);
    }
  }

  // ------------------------------------------------------------------ init
  refreshBtn.addEventListener('click', forcePoll);
  clearBtn.addEventListener('click', clearAll);
  searchEl.addEventListener('input', renderList);
  autoEl.addEventListener('change', () => {
    if (autoEl.checked) { clearTimeout(pollTimer); poll(); }
    else clearTimeout(pollTimer);
  });

  poll();
})();
</script>
</body>
</html>
