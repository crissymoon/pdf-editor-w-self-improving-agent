name: electron-container-tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  server-readiness-gate:
    name: server readiness review gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: run server-readiness check
        run: npm run review:server

  linux-and-windows-container-tests:
    name: docker linux+windows packaging smoke tests
    runs-on: ubuntu-latest
    needs: server-readiness-gate
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: print tool versions
        run: |
          node --version
          npm --version
          docker --version
          docker compose version

      - name: run linux docker smoke test
        run: npm run docker:test:linux

      - name: run windows docker smoke test
        run: npm run docker:test:windows

      - name: upload linux and windows artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-artifacts-docker
          path: |
            release/**/*.AppImage
            release/**/*.exe
            release/**/*.blockmap
          if-no-files-found: warn

  macos-packaging-smoke:
    name: macos packaging smoke test
    runs-on: macos-latest
    needs: server-readiness-gate
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: verify macos packaging config
        run: node docker/scripts/verify-macos-config.js

      - name: build macos package
        run: npm run pack:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: run macos smoke checks
        run: bash docker/scripts/smoke-macos-check.sh

      - name: upload macos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-artifacts-macos
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.blockmap
          if-no-files-found: warn
