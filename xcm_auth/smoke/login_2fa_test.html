<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Website Login + App TOTP Test</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --ink: #e5e7eb;
      --muted: #9ca3af;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --border: #27324b;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 0%, #1e293b, var(--bg));
      color: var(--ink);
      font-family: Segoe UI, Arial, sans-serif;
      padding: 24px;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(900px, 100%);
      background: linear-gradient(180deg, #10172a, #0c1221);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.4);
      padding: 20px;
    }

    h1 { margin: 0 0 8px; font-size: 25px; }
    p { margin: 0 0 16px; color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .full { grid-column: 1 / -1; }

    label {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 12px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #0a1225;
      color: var(--ink);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      font-family: Consolas, monospace;
    }

    textarea { min-height: 80px; resize: vertical; }
    input:focus, textarea:focus { border-color: var(--accent); }

    .row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      background: #334155;
      cursor: pointer;
      font-weight: 600;
    }

    button.primary { background: #2563eb; }
    button.good { background: #15803d; }

    .status {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #0a1225;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 12px;
    }

    .ok { color: var(--good); }
    .warn { color: var(--warn); }
    .err { color: var(--bad); }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Website Login + Authenticator App TOTP</h1>
    <p>
      Intended flow: login to auth app without 2FA, then login here with username/password,
      then enter the code generated by the app.
    </p>

    <div class="grid">
      <div>
        <label for="identifier">Website Login Identifier</label>
        <input id="identifier" />
      </div>
      <div>
        <label for="password">Website Login Password</label>
        <input id="password" type="password" />
      </div>

      <div>
        <label for="code">Code from Authenticator App</label>
        <input id="code" placeholder="6-digit code" />
      </div>
      <div>
        <label for="sessionId">Bridge Session ID (auto after step 1)</label>
        <input id="sessionId" readonly />
      </div>

      <div class="full">
        <label for="otpauth">Account Seed (add this in app via manual add / QR import)</label>
        <textarea id="otpauth" readonly></textarea>
      </div>
    </div>

    <div class="row">
      <button class="primary" id="btnStep1">1) Login Website (password)</button>
      <button class="good" id="btnStep2">2) Verify TOTP from App</button>
      <button id="btnHealth">Bridge Health</button>
    </div>

    <div class="status" id="status">Loading bootstrap info...</div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function setStatus(text, mode = '') {
      const el = $('status');
      el.textContent = text;
      el.className = 'status ' + mode;
    }

    async function getJson(url) {
      const r = await fetch(url, { method: 'GET' });
      const j = await r.json();
      return { status: r.status, json: j };
    }

    async function postJson(url, body) {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      const j = await r.json();
      return { status: r.status, json: j };
    }

    async function bootstrap() {
      const out = await getJson('/api/bootstrap');
      if (!out.json || !out.json.ok) {
        setStatus('Bootstrap failed.\n' + JSON.stringify(out.json, null, 2), 'err');
        return;
      }

      const data = out.json.data || {};
      $('identifier').value = data.identifier || '';
      $('otpauth').value = data.otpauth_uri || '';

      setStatus(
        'Bridge ready.\n' +
        'xcm_auth upstream: ' + (data.auth_url || 'unknown') + '\n' +
        'Add this account seed into the app, then use step 1 and step 2.',
        'ok'
      );
    }

    async function step1() {
      const identifier = $('identifier').value.trim();
      const password = $('password').value;
      const out = await postJson('/api/login', { identifier, password });

      if (out.status === 200 && out.json && out.json.ok) {
        const sid = out.json.data && out.json.data.session_id ? out.json.data.session_id : '';
        $('sessionId').value = sid;
        setStatus('Step 1 OK (first-factor login passed).\nNow enter app code and run step 2.\n\n' + JSON.stringify(out.json, null, 2), 'warn');
      } else {
        setStatus('Step 1 failed.\n\n' + JSON.stringify(out.json, null, 2), 'err');
      }
    }

    async function step2() {
      const session_id = $('sessionId').value.trim();
      const code = $('code').value.trim();
      const out = await postJson('/api/verify-code', { session_id, code });

      if (out.status === 200 && out.json && out.json.ok) {
        setStatus('Step 2 OK. Access granted.\n\n' + JSON.stringify(out.json, null, 2), 'ok');
      } else {
        setStatus('Step 2 failed.\n\n' + JSON.stringify(out.json, null, 2), 'err');
      }
    }

    async function health() {
      const out = await getJson('/health');
      setStatus('Bridge health\n' + JSON.stringify(out.json, null, 2), out.status === 200 ? 'ok' : 'err');
    }

    $('btnStep1').addEventListener('click', () => step1().catch((e) => setStatus(String(e), 'err')));
    $('btnStep2').addEventListener('click', () => step2().catch((e) => setStatus(String(e), 'err')));
    $('btnHealth').addEventListener('click', () => health().catch((e) => setStatus(String(e), 'err')));

    bootstrap().catch((e) => setStatus(String(e), 'err'));
  </script>
</body>
</html>
